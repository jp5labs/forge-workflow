forge:
  version: 1

repo:
  org: ""
  name: ""

bots: []

project_board:
  enabled: false

notifications:
  discord:
    enabled: false

hooks:
  # Mode: "autonomous" wires safety hooks via settings.local.json;
  # "supervised" leaves settings.local.json empty (manual approval).
  mode: supervised

  # Settings generator: path to a custom script, or omit to use
  # forge-workflow's built-in generator (python -m forge_workflow.lib.settings_generator).
  # The built-in generator merges forge safety hooks into any existing
  # settings.local.json without overwriting other settings.
  # settings_generator: /workspace/scripts/generate-settings-local.py

  # Custom hooks: additional hook entries merged alongside forge safety hooks.
  # Each entry needs an event name and command. Matcher is optional.
  # These let repos add project-specific hooks (notifications, custom checks)
  # without forking the settings generator.
  # custom:
  #   - event: Notification
  #     command: "bash scripts/hooks/notify.sh notification"
  #   - event: PreToolUse
  #     matcher: Bash
  #     command: "bash scripts/hooks/cancel-notify.sh"
  #   - event: SessionStart
  #     command: "bash scripts/hooks/notify.sh session-start"
